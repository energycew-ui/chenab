<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Energy Dashboard - History</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
font-size:1.06rem;
background-image:url('https://chenabengineering.com/wp-content/uploads/2023/06/istockphoto-1147790557-612x612-1.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
}
</style>
</head>
<body class="text-gray-800 min-h-screen">
<header class="bg-green-700 text-white p-4">
<div class="container mx-auto flex justify-between items-center">
<div>
<h1 class="text-2xl font-bold">Smart Energy Dashboard - History</h1>
<p id="meterName" class="text-sm"></p>
</div>
<div class="flex gap-3">
<button onclick="window.close()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">Close</button>
<a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Back to Dashboard</a>
</div>
</div>
</header>
<main class="container mx-auto p-6">
<div class="bg-white p-6 rounded-xl shadow-xl mb-6">
<div class="grid md:grid-cols-4 gap-4 items-end">
<div>
<label class="font-semibold text-sm">Select Date</label>
<input type="date" id="historyDate" class="border p-2 rounded w-full">
</div>
<div>
<label class="font-semibold text-sm">Time From</label>
<input type="time" id="timeFrom" class="border p-2 rounded w-full">
</div>
<div>
<label class="font-semibold text-sm">Time To</label>
<input type="time" id="timeTo" class="border p-2 rounded w-full">
</div>
<div>
<button id="searchBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded w-full">Search History</button>
</div>
</div>
</div>
<div class="bg-white p-6 rounded-xl shadow-xl overflow-x-auto">
<table class="min-w-full text-sm text-left border">
<thead class="bg-gray-200">
<tr id="tableHead"></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</main>
<script>
const sheetID="1zsuG8lYGSOH8XDAWLx5mGi2MM2mMUDpwcoaHolVeEkE";
const sheetName="Sheet1";
const url=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
const params=new URLSearchParams(window.location.search);
const meter=params.get("meter");
document.getElementById("meterName").innerText="Meter: "+(meter?meter:"Unknown");
document.getElementById("searchBtn").addEventListener("click",async()=>{
const selectedDate=document.getElementById("historyDate").value;
const timeFrom=document.getElementById("timeFrom").value;
const timeTo=document.getElementById("timeTo").value;
if(!selectedDate||!timeFrom||!timeTo){
alert("Please select date and time range.");
return;
}
const fromDateTime=new Date(`${selectedDate}T${timeFrom}:00`);
const toDateTime=new Date(`${selectedDate}T${timeTo}:59`);
const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substr(47).slice(0,-2));
const rows=json.table.rows;
const headers=json.table.cols.map(c=>c.label);
document.getElementById("tableHead").innerHTML=headers.map(h=>`<th class="border px-3 py-2">${h}</th>`).join("");
let filtered=[];
rows.forEach(r=>{
if(!r.c||!r.c[0]||!r.c[0].v)return;
const rowDate=new Date(r.c[0].v.replace(" ","T"));
if(rowDate>=fromDateTime&&rowDate<=toDateTime){
filtered.push(r);
}
});
if(filtered.length===0){
alert("No records in selected range.");
document.getElementById("tableBody").innerHTML="";
return;
}
document.getElementById("tableBody").innerHTML=filtered.map(r=>`<tr>${r.c.map(cell=>`<td class="border px-3 py-2">${cell?cell.v:""}</td>`).join("")}</tr>`).join("");
});
</script>
</body>
</html>
